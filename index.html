<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRIUM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="atom-canvas"></canvas>

    <div class="main-wrapper">
        <div class="logo-container">
            <img src="logo.png" alt="NATRIUM" class="logo" id="site-logo">
        </div>

        <h1 id="site-title">Загрузка...</h1>
        <div class="subtitle" id="site-subtitle">Загрузка...</div>

        <div class="download-section">
            <div class="card">
                <span class="version-tag" id="card-version">0.0.0</span>
                <span class="file-type" id="card-type">Загрузка...</span>
                <a href="#" download class="btn-download" id="download-link">Скачать сборку</a>
            </div>
        </div>

        <!-- Соцсети проекта NATRIUM -->
        <div class="social-links">
            <a href="#" target="_blank" class="link-item" id="tg-channel">
                Наш Telegram-канал: <span id="channel-name">@username</span>
            </a>
            <a href="#" target="_blank" class="link-item" id="tg-chat">
                Наш Telegram-чат: <span id="chat-name">@username</span>
            </a>
            <a href="#" target="_blank" class="link-item" id="tg-bot">
                Техподдержка / Баги: <span id="bot-name">@username</span>
            </a>
        </div>
    </div>

    <script>
        /* ==========================================================================
           ⚙️ ПАНЕЛЬ НАСТРОЕК NATRIUM (МЕНЯЙ ВСЁ ТУТ В ТРИ КЛИКА)
           ========================================================================== */
        const CONFIG = {
            title: "Natrium",
            subtitle: "Сборка-каркас на Minecraft, состоящая из полной оптимизации",
            version: "1.20.1",
            fileType: "Модпак .mrpack",
            
            downloadUrl: "natrium.mrpack",
            downloadFileName: "Natrium_1.20.1.mrpack",
            
            channelUser: "@JavaFixer",
            channelUrl: "https://t.me",
            
            chatUser: "@JavaFixerChat",
            chatUrl: "https://t.meChat",
            
            botUser: "@JavaFixerTEXbot",
            botUrl: "https://t.meTEXbot",
            
            faviconUrl: "favicon.png?v=4"
        };

        /* ==========================================================================
           АВТОМАТИЧЕСКАЯ ПОДСТАНОВКА НАСТРОЕК
           ========================================================================== */
        document.getElementById('site-title').innerText = CONFIG.title;
        document.getElementById('site-subtitle').innerText = CONFIG.subtitle;
        document.getElementById('card-version').innerText = CONFIG.version;
        document.getElementById('card-type').innerText = CONFIG.fileType;
        
        const dlLink = document.getElementById('download-link');
        dlLink.href = CONFIG.downloadUrl;
        dlLink.setAttribute('download', CONFIG.downloadFileName);
        
        document.getElementById('tg-channel').href = CONFIG.channelUrl;
        document.getElementById('channel-name').innerText = CONFIG.channelUser;
        
        document.getElementById('tg-chat').href = CONFIG.chatUrl;
        document.getElementById('chat-name').innerText = CONFIG.chatUser;
        
        document.getElementById('tg-bot').href = CONFIG.botUrl;
        document.getElementById('bot-name').innerText = CONFIG.botUser;

        const fav = document.createElement('link');
        fav.rel = 'icon'; fav.href = CONFIG.faviconUrl;
        document.head.appendChild(fav);

        /* ==========================================================================
           ДВИЖОК ЧАСТИЦ (ВОДА + НЕОНОВЫЙ ШЛЕЙФ ИСКР)
           ========================================================================== */
        const canvas = document.getElementById('atom-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let sparks = []; 
        const mouse = { x: null, y: null, radius: 140 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }
        window.addEventListener('resize', resizeCanvas);
        
        window.addEventListener('mousemove', (e) => { 
            mouse.x = e.x; 
            mouse.y = e.y;
            if (sparks.length < 40) {
                sparks.push(new Spark(e.x, e.y));
            }
        });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y; this.baseX = x; this.baseY = y;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
            }
            update() {
                this.baseX += this.speedX; this.baseY += this.speedY;
                if (this.baseX < 0 || this.baseX > canvas.width) this.speedX *= -1;
                if (this.baseY < 0 || this.baseY > canvas.height) this.speedY *= -1;

                if (mouse.x != null && mouse.y != null) {
                    let dx = mouse.x - this.baseX;
                    let dy = mouse.y - this.baseY;
                    let distance = Math.hypot(dx, dy);

                    if (distance < mouse.radius) {
                        let force = (mouse.radius - distance) / mouse.radius;
                        let angle = Math.atan2(dy, dx);
                        let targetX = this.baseX - Math.cos(angle) * force * 35;
                        let targetY = this.baseY - Math.sin(angle) * force * 35;
                        this.x += (targetX - this.x) * 0.1;
                        this.y += (targetY - this.y) * 0.1;
                        return;
                    }
                }
                this.x += (this.baseX - this.x) * 0.08;
                this.y += (this.baseY - this.y) * 0.08;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255, 180, 0, 0.25)' : 'rgba(255, 85, 0, 0.15)';
                ctx.fill();
            }
        }

        class Spark {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 3 + 2;
                this.speedX = (Math.random() - 0.5) * 1.5;
                this.speedY = (Math.random() - 0.5) * 1.5;
                this.alpha = 1; 
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                this.alpha -= 0.02; 
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffaa00'; 
                ctx.fillStyle = '#ffcc00';
                ctx.fill();
                ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.floor((canvas.width * canvas.height) / 9000);
            for (let i = 0; i < count; i++) particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) { p.update(); p.draw(); }
            for (let i = 0; i < sparks.length; i++) {
                sparks[i].update();
                sparks[i].draw();
                if (sparks[i].alpha <= 0) {
                    sparks.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }
        resizeCanvas(); animate();
    </script>
</body>
</html>
