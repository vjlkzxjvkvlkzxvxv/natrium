<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" id="meta-viewport">
    <title>NATRIUM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="time-widget" id="realtime-widget"></div>
        <button class="btn-roulette-trigger" id="btn-roulette-open"></button>

        <canvas id="atom-canvas"></canvas>

        <div class="main-wrapper">
            <div class="logo-container">
                <img alt="Logo" class="logo" id="site-logo">
            </div>

            <h1 id="site-title"></h1>
            <div class="subtitle" id="site-subtitle"></div>

            <div class="cards-grid" id="versions-container"></div>
            
            <div class="instruction-wrapper" id="instruction-container"></div>
            
            <div class="bottom-links" id="socials-container"></div>
        </div>

        <div class="modal-overlay" id="mods-modal">
            <div class="modal-window">
                <div class="modal-header">
                    <div class="modal-title" id="mods-modal-title"></div>
                    <button class="modal-close" id="mods-close-btn">&times;</button>
                </div>
                <div class="search-container">
                    <input type="text" class="search-input" id="mods-search">
                </div>
                <div class="mods-list" id="modal-mods-list"></div>
            </div>
        </div>

        <div class="modal-overlay" id="roulette-modal">
            <div class="modal-window" style="max-width: 550px;">
                <div class="modal-header">
                    <div class="modal-title" id="roulette-modal-title"></div>
                    <button class="modal-close" id="roulette-close-btn">&times;</button>
                </div>
                
                <div class="roulette-container">
                    <div class="roulette-marker"></div>
                    <div class="roulette-tape" id="roulette-tape"></div>
                </div>

                <div class="roulette-actions">
                    <button class="btn-download" id="btn-spin"></button>
                    <div class="roulette-result-buttons" id="roulette-result-ui">
                        <button class="btn-download" id="roulette-download-btn"></button>
                        <button class="btn-mods" style="margin-bottom: 4px;" id="btn-spin-again"></button>
                        <button class="btn-mods" id="btn-roulette-home"></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="download-modal">
            <div class="modal-window" style="max-width: 450px; text-align: center;">
                <div class="modal-header" style="justify-content: center; position: relative;">
                    <div class="modal-title" id="download-modal-title" style="font-size: 1.4rem;"></div>
                    <button class="modal-close" id="download-close-btn" style="position: absolute; right: 0; top: -10px;">&times;</button>
                </div>
                <div style="margin: 20px 0; color: #94a3b8; font-size: 1rem;">
                    Загрузка файла начнется автоматически. Пока вы ждете, присоединяйтесь к нашим сообществам!
                </div>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <a href="https://t.me/NatriumProject" target="_blank" class="btn-download" style="margin-bottom: 0;">Telegram Channel</a>
                    <a href="https://t.me/JavaFixer" target="_blank" class="btn-mods" style="padding: 16px; border-radius: 14px;">Telegram Channel Автора</a>
                </div>
            </div>
        </div>
    </div>

    <script src="audio-base64.js" defer></script>
    <script src="cfg.js" defer></script>
    <script src="app.js" defer></script>
</body>
</html>
