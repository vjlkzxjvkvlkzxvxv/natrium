<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRIUM — Сборка-каркас Minecraft</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            background-color: #080809;
            color: #ffffff;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        #atom-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .main-wrapper {
            text-align: center;
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        .logo-container {
            position: relative;
            margin-bottom: 25px;
            width: 160px;
            height: 160px;
            border-radius: 38px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
        }

        .logo-container:hover {
            transform: scale(1.06) rotate(2deg);
            box-shadow: 0 0 40px rgba(255, 140, 0, 0.5);
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: clamp(3.5rem, 8vw, 5.5rem);
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffcc00 0%, #ff5500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 20px rgba(255, 85, 0, 0.4));
            text-transform: uppercase;
        }

        .subtitle {
            color: #94a3b8;
            font-size: clamp(1.1rem, 3vw, 1.35rem);
            max-width: 600px;
            line-height: 1.6;
            margin-bottom: 45px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .download-section {
            width: 100%;
            max-width: 380px;
            margin-bottom: 50px;
        }

        .card {
            background: rgba(15, 15, 18, 0.75);
            border: 2px solid rgba(255, 183, 0, 0.12);
            border-radius: 26px;
            padding: 35px 25px;
            position: relative;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 183, 0, 0.5);
            box-shadow: 0 30px 60px rgba(255, 85, 0, 0.18), 0 0 40px rgba(255, 183, 0, 0.08);
        }

        .version-tag {
            font-size: 2.6rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 5px;
            display: block;
        }

        .file-type {
            color: #ffaa00;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            display: block;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: linear-gradient(135deg, #ffcc00 0%, #ff6600 100%);
            color: #080809;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 25px rgba(255, 85, 0, 0.3);
        }

        .btn-download:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 35px rgba(255, 85, 0, 0.6), 0 0 30px rgba(255, 204, 0, 0.2);
            cursor: pointer;
        }

        .bot-support {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 12px 24px;
            border-radius: 30px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            backdrop-filter: blur(5px);
        }

        .bot-support span {
            color: #ffcc00;
            font-weight: 700;
        }

        .bot-support:hover {
            background-color: rgba(255, 183, 0, 0.04);
            border-color: rgba(255, 183, 0, 0.3);
            color: #ffffff;
        }
    </style>
</head>
<body>

    <canvas id="atom-canvas"></canvas>

    <div class="main-wrapper">
        <div class="logo-container">
            <img src="logo.png" alt="NATRIUM" class="logo" id="site-logo">
        </div>

        <h1 id="site-title">Загрузка...</h1>
        <div class="subtitle" id="site-subtitle">Загрузка...</div>

        <div class="download-section">
            <div class="card">
                <span class="version-tag" id="card-version">0.0.0</span>
                <span class="file-type" id="card-type">Загрузка...</span>
                <a href="#" download class="btn-download" id="download-link">Скачать сборку</a>
            </div>
        </div>

        <a href="#" target="_blank" class="bot-support" id="bot-link">
            Нашли баг или краш? Пишите в бота: <span id="bot-name">@username</span>
        </a>
    </div>

    <!-- ДВИЖОК ЭФФЕКТОВ И ПАНЕЛЬ НАСТРОЕК САЙТА -->
    <script>
        /* ==========================================================================
           ⚙️ ПАНЕЛЬ НАСТРОЕК NATRIUM (МЕНЯЙ ВСЁ ТУТ В ТРИ КЛИКА)
           ========================================================================== */
        const CONFIG = {
            title: "Natrium",                                    // Главное название
            subtitle: "Сборка-каркас на Minecraft, состоящая из полной оптимизации", // Твой слоган
            version: "1.20.1",                                   // Версия на карточке
            fileType: "Модпак .mrpack",                          // Подпись формата файла
            
            // Настройка скачивания (Пока тестируешь на компе — оставь "natrium.mrpack")
            // Когда зальешь в репозиторий GitHub, замени на полную интернет-ссылку
            downloadUrl: "natrium.mrpack",                       
            downloadFileName: "Natrium_1.20.1.mrpack",           // Как файл назовется у игрока при скачивании
            
            // Настройка Telegram-бота
            botUsername: "@JavaFixerTEXbot",                     // Юзернейм для текста
            botUrl: "https://t.me/JavaFixerTEXbot"               // Реальная ссылка на переход
        };

        /* ==========================================================================
           АВТОМАТИЧЕСКАЯ ПОДСТАНОВКА НАСТРОЕК НА САЙТ
           ========================================================================== */
        document.getElementById('site-title').innerText = CONFIG.title;
        document.getElementById('site-subtitle').innerText = CONFIG.subtitle;
        document.getElementById('card-version').innerText = CONFIG.version;
        document.getElementById('card-type').innerText = CONFIG.fileType;
        
        const dlLink = document.getElementById('download-link');
        dlLink.href = CONFIG.downloadUrl;
        dlLink.setAttribute('download', CONFIG.downloadFileName);
        
        const bLink = document.getElementById('bot-link');
        bLink.href = CONFIG.botUrl;
        document.getElementById('bot-name').innerText = CONFIG.botUsername;

        /* ==========================================================================
           ДВИЖОК ИНТЕРАКТИВНОЙ ВОДЫ И ЛЕТАЮЩИХ ЧАСТИЦ
           ========================================================================== */
        const canvas = document.getElementById('atom-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null, radius: 140 }; // Радиус обтекания мышки

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y; this.baseX = x; this.baseY = y;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
            }
            update() {
                this.baseX += this.speedX; this.baseY += this.speedY;
                if (this.baseX < 0 || this.baseX > canvas.width) this.speedX *= -1;
                if (this.baseY < 0 || this.baseY > canvas.height) this.speedY *= -1;

                if (mouse.x != null && mouse.y != null) {
                    let dx = mouse.x - this.baseX;
                    let dy = mouse.y - this.baseY;
                    let distance = Math.hypot(dx, dy);

                    if (distance < mouse.radius) {
                        let force = (mouse.radius - distance) / mouse.radius;
                        let angle = Math.atan2(dy, dx);
                        let targetX = this.baseX - Math.cos(angle) * force * 35;
                        let targetY = this.baseY - Math.sin(angle) * force * 35;

                        this.x += (targetX - this.x) * 0.1;
                        this.y += (targetY - this.y) * 0.1;
                        return;
                    }
                }
                this.x += (this.baseX - this.x) * 0.08;
                this.y += (this.baseY - this.y) * 0.08;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255, 180, 0, 0.35)' : 'rgba(255, 85, 0, 0.25)';
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.floor((canvas.width * canvas.height) / 9000);
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) {
                p.update();
                p.draw();
            }
            requestAnimationFrame(animate);
        }

        resizeCanvas();
        animate();
    </script>
</body>
</html>
