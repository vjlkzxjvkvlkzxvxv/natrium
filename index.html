<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRIUM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.4s, box-shadow 0.4s;
        }

        body {
            background-color: #050506;
            color: #ffffff;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 60px 20px 40px 20px;
        }

        #atom-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .main-wrapper {
            text-align: center;
            max-width: 1100px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }
        /* Виджет времени в левом верхнем углу */
        .time-widget {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(16, 16, 20, 0.6);
            border: 1px solid rgba(255, 170, 0, 0.15);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #94a3b8;
            backdrop-filter: blur(10px);
            z-index: 10;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .time-widget span {
            color: #ffaa00;
            font-weight: 700;
        }

        /* Кнопка рулетки в правом верхнем углу */
        .btn-roulette-trigger {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, rgba(255, 204, 0, 0.1) 0%, rgba(255, 85, 0, 0.1) 100%);
            border: 1px solid rgba(255, 170, 0, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffaa00;
            backdrop-filter: blur(10px);
            z-index: 10;
            cursor: pointer;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 25px rgba(255, 85, 0, 0.05);
        }

        .btn-roulette-trigger:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 170, 0, 0.6);
            box-shadow: 0 12px 30px rgba(255, 85, 0, 0.2);
            color: #ffffff;
        }

        .logo-container {
            position: relative;
            margin-bottom: 25px;
            width: 160px;
            height: 160px;
            border-radius: 38px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }

        .logo-container:hover {
            transform: scale(1.06) rotate(2deg);
            box-shadow: 0 0 40px rgba(255, 140, 0, 0.6);
        }

        .logo {
            width: 100%; height: 100%; object-fit: cover;
        }

        h1 {
            font-size: clamp(3.5rem, 8vw, 5.5rem);
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffcc00 0%, #ff5500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 20px rgba(255, 85, 0, 0.4));
            text-transform: uppercase;
        }

        .subtitle {
            color: #94a3b8;
            font-size: clamp(1.1rem, 3vw, 1.35rem);
            max-width: 600px;
            line-height: 1.6;
            margin-bottom: 50px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 740px;
            margin-bottom: 50px;
            justify-content: center;
        }

        .card {
            background: rgba(16, 16, 20, 0.9);
            border: 2px solid rgba(255, 183, 0, 0.2);
            border-radius: 28px;
            padding: 40px 30px;
            position: relative;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 183, 0, 0.5);
            box-shadow: 0 30px 60px rgba(255, 85, 0, 0.15);
        }

        .card-title {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffcc00 0%, #ff5500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            display: block;
            text-align: center;
        }

        .card-version {
            font-size: 1.3rem;
            font-weight: 700;
            color: #94a3b8;
            margin-top: -5px;
            margin-bottom: 15px;
            display: block;
            letter-spacing: 1px;
        }

        .file-type {
            color: #ffaa00; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; display: block;
        }

        .btn-download {
            display: inline-flex; align-items: center; justify-content: center; width: 100%;
            background: linear-gradient(135deg, #ffcc00 0%, #ff6600 100%);
            color: #080809; text-decoration: none; padding: 16px 32px; border-radius: 14px;
            font-size: 1.1rem; font-weight: 800; letter-spacing: 0.5px; margin-bottom: 12px;
            box-shadow: 0 8px 25px rgba(255, 85, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-download:hover { transform: scale(1.03); box-shadow: 0 12px 35px rgba(255, 85, 0, 0.5); }

        .btn-mods {
            display: inline-flex; align-items: center; justify-content: center; width: 100%;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 170, 0, 0.3);
            color: #ffaa00; text-decoration: none; padding: 12px 24px; border-radius: 12px;
            font-size: 0.95rem; font-weight: 700; cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }

        .btn-mods:hover { background: rgba(255, 170, 0, 0.1); border-color: rgba(255, 170, 0, 0.6); color: #ffffff; }

        .bottom-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }

        .pill-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 14px 26px;
            border-radius: 30px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            backdrop-filter: blur(5px);
            position: relative;
            z-index: 3;
            width: 100%;
        }

        .pill-button span { color: #ffcc00; font-weight: 700; margin-left: 5px; }
        .pill-button:hover { background-color: rgba(255, 183, 0, 0.04); border-color: rgba(255, 183, 0, 0.3); color: #ffffff; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 3, 4, 0.7); backdrop-filter: blur(20px);
            z-index: 100; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-window {
            background: rgba(18, 18, 24, 0.95); border: 2px solid rgba(255, 170, 0, 0.25);
            border-radius: 32px; width: 90%; max-width: 650px; max-height: 80vh;
            padding: 35px; display: flex; flex-direction: column; box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .modal-overlay.active .modal-window { transform: scale(1); }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }

        .modal-title { font-size: 1.8rem; font-weight: 800; color: #ffffff; }
        .modal-title span { color: #ffaa00; }

        .modal-close {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8; font-size: 1.5rem; width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;
        }

        .modal-close:hover { background: rgba(255, 85, 0, 0.2); border-color: rgba(255, 85, 0, 0.4); color: #ffffff; }

        .search-container { margin-bottom: 20px; position: relative; }

        .search-input {
            width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 170, 0, 0.2);
            border-radius: 14px; padding: 14px 20px; color: #ffffff; font-size: 1rem; outline: none; font-family: inherit;
        }

        .search-input:focus { border-color: rgba(255, 170, 0, 0.6); box-shadow: 0 0 15px rgba(255, 170, 0, 0.15); }

        .mods-list { overflow-y: auto; padding-right: 10px; flex: 1; }
        .mods-list::-webkit-scrollbar { width: 6px; }
        .mods-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .mods-list::-webkit-scrollbar-thumb { background: rgba(255, 170, 0, 0.3); border-radius: 10px; }
        .mods-list::-webkit-scrollbar-thumb:hover { background: rgba(255, 170, 0, 0.6); }

        .mod-item {
            background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.03);
            padding: 14px 18px; border-radius: 14px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 4px;
        }

        .mod-item.hidden { display: none !important; }
        .mod-item:hover { background: rgba(255,170,0,0.02); border-color: rgba(255,170,0,0.15); }
        .mod-name { font-weight: 700; color: #ffcc00; font-size: 1.1rem; }
        .mod-desc { color: #94a3b8; font-size: 0.9rem; line-height: 1.4; }

        /* Элементы и анимация рулетки */
        .roulette-container {
            position: relative; width: 100%; max-width: 500px; height: 110px;
            background: #0d0d11; border: 2px solid rgba(255, 170, 0, 0.2);
            border-radius: 20px; overflow: hidden; margin: 20px auto;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .roulette-marker {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 4px; height: 100%; background: #ffaa00; z-index: 10;
            box-shadow: 0 0 15px #ff5500; pointer-events: none;
        }

        .roulette-tape {
            display: flex; position: absolute; left: 0; top: 5px; height: 100px;
            transform: translateX(0); will-change: transform;
        }

        .roulette-item {
            flex-shrink: 0; width: 140px; height: 100px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #13131a; border: 1px solid rgba(255,255,255,0.03);
            border-radius: 14px; margin: 0 5px; font-weight: 800; font-size: 1.2rem;
        }

        .roulette-item.v1_20_1 { background: linear-gradient(145deg, #1e1b10, #13131a); color: #ffcc00; }
        .roulette-item.v1_16_5 { background: linear-gradient(145deg, #1a1510, #13131a); color: #ff6600; }
        .roulette-item span { font-size: 0.8rem; font-weight: 600; color: #94a3b8; margin-top: 2px; }

        .roulette-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 15px; }
        .roulette-result-buttons { display: none; flex-direction: column; gap: 10px; width: 100%; }
        .roulette-result-buttons.active { display: flex; }
    </style>
</head>
<body>

    <!-- Виджет времени и кнопка рулетки -->
    <div class="time-widget" id="realtime-widget">Загрузка времени...</div>
    <button class="btn-roulette-trigger" onclick="openRouletteModal()">Испытать удачу</button>

    <canvas id="atom-canvas"></canvas>

    <div class="main-wrapper">
        <div class="logo-container">
            <img src="logo.webp" alt="NATRIUM" class="logo" id="site-logo">
        </div>

        <h1 id="site-title"></h1>
        <div class="subtitle" id="site-subtitle"></div>

        <div class="cards-grid" id="versions-container"></div>

        <div class="bottom-links" id="socials-container"></div>
    </div>

    <!-- Модальное окно модов -->
    <div class="modal-overlay" id="mods-modal">
        <div class="modal-window">
            <div class="modal-header">
                <div class="modal-title">Моды сборки <span>NATRIUM</span></div>
                <button class="modal-close" onclick="closeModsModal()">&times;</button>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" id="mods-search" placeholder="Поиск мода (например: содиум, феррите кор)..." oninput="filterMods()">
            </div>
            <div class="mods-list" id="modal-mods-list"></div>
        </div>
    </div>

    <!-- Модальное окно рулетки -->
    <div class="modal-overlay" id="roulette-modal">
        <div class="modal-window" style="max-width: 550px;">
            <div class="modal-header">
                <div class="modal-title">Рулетка версий <span>NATRIUM</span></div>
                <button class="modal-close" onclick="closeRouletteModal()">&times;</button>
            </div>
            
            <div class="roulette-container">
                <div class="roulette-marker"></div>
                <div class="roulette-tape" id="roulette-tape"></div>
            </div>

            <div class="roulette-actions">
                <button class="btn-download" id="btn-spin" onclick="spinRoulette()">Крутить рулетку</button>
                <div class="roulette-result-buttons" id="roulette-result-ui">
                    <a href="#" class="btn-download" id="roulette-download-link" download>Скачать выпавшую сборку</a>
                    <button class="btn-mods" style="margin-bottom: 4px;" onclick="spinRoulette()">Крутить еще раз</button>
                    <button class="btn-mods" onclick="closeRouletteModal()">На главную</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fav = document.createElement('link');
        fav.rel = 'icon'; fav.href = 'favicon.png?v=5';
        document.head.appendChild(fav);
        // Виджет реального времени устройства
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const offsetHours = -now.getTimezoneOffset() / 60;
            const zoneStr = offsetHours >= 0 ? `+${offsetHours}` : `${offsetHours}`;
            
            document.getElementById('realtime-widget').innerHTML = `Время: <span>${timeStr}</span> (GMT${zoneStr})`;

            let greeting = "Доброй ночи.";
            if (hours >= 6 && hours < 12) greeting = "Доброе утро.";
            else if (hours >= 12 && hours < 18) greeting = "Добрый день.";
            else if (hours >= 18 && hours < 24) greeting = "Добрый вечер.";

            const baseSubtitle = NATRIUM_CONFIG.texts.subtitle;
            document.getElementById('site-subtitle').innerHTML = `<span style="color: #ffaa00; font-weight: 700;">${greeting}</span><br style="margin-bottom: 6px;">${baseSubtitle}`;
        }

        // Анимация Canvas
        const canvas = document.getElementById('atom-canvas');
        const ctx = canvas.getContext('2d');
        let particles = []; let sparks = []; const mouse = { x: null, y: null, radius: 140 };

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initParticles(); }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('mousemove', (e) => { 
            mouse.x = e.clientX; mouse.y = e.clientY;
            if (sparks.length < 45) sparks.push(new Spark(e.clientX, e.clientY));
        });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y; this.baseX = x; this.baseY = y; this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.4; this.speedY = (Math.random() - 0.5) * 0.4;
            }
            update() {
                this.baseX += this.speedX; this.baseY += this.speedY;
                if (this.baseX < 0 || this.baseX > canvas.width) this.speedX *= -1;
                if (this.baseY < 0 || this.baseY > canvas.height) this.speedY *= -1;
                let targetX = this.baseX; let targetY = this.baseY;
                if (mouse.x != null && mouse.y != null) {
                    let dx = mouse.x - this.baseX; let dy = mouse.y - this.baseY; let distance = Math.hypot(dx, dy);
                    if (distance < mouse.radius) {
                        let force = (mouse.radius - distance) / mouse.radius; let angle = Math.atan2(dy, dx);
                        targetX = this.baseX - Math.cos(angle) * force * 45; targetY = this.baseY - Math.sin(angle) * force * 45;
                    }
                }
                this.x += (targetX - this.x) * 0.08; this.y += (targetY - this.y) * 0.08;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255, 180, 0, 0.25)' : 'rgba(255, 85, 0, 0.15)'; ctx.fill();
            }
        }

        class Spark {
            constructor(x, y) {
                this.x = x; this.y = y; this.maxSize = Math.random() * 3 + 2; this.size = this.maxSize;
                this.speedX = (Math.random() - 0.5) * 2.5; this.speedY = (Math.random() - 0.5) * 2.5;
                this.alpha = 1; this.life = 1; this.decay = Math.random() * 0.015 + 0.012;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY; this.speedX *= 0.97; this.speedY *= 0.97;
                this.life -= this.decay; this.alpha = this.life; this.size = this.maxSize * this.life;
                if (this.size < 0) this.size = 0;
            }
            draw() {
                if (this.alpha <= 0) return;
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.shadowBlur = 15; ctx.shadowColor = '#ff8800'; ctx.fillStyle = '#ffbb00'; ctx.fill(); ctx.restore();
            }
        }

        function initParticles() {
            particles = []; const count = Math.floor((canvas.width * canvas.height) / 9000);
            for (let i = 0; i < count; i++) particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) { p.update(); p.draw(); }
            for (let i = sparks.length - 1; i >= 0; i--) { sparks[i].update(); sparks[i].draw(); if (sparks[i].alpha <= 0) { sparks.splice(i, 1); } }
            requestAnimationFrame(animate);
        }

        const NATRIUM_CONFIG = {
            texts: { title: "NATRIUM", subtitle: "Сборка-каркас на Minecraft, состоящая из полной оптимизации" },
            versions: [
                { versionNum: "1.20.1", fileType: "Модпак .mrpack", link: "./natrium.mrpack", fileName: "Natrium_1.20.1.mrpack" },
                { versionNum: "1.16.5", fileType: "Модпак .mrpack", link: "./natrium_two.mrpack", fileName: "Natrium_two.mrpack" }
            ],
            socials: [
                { text: "Наш Telegram-канал:", span: "@JavaFixer", url: "https://t.me" },
                { text: "Наш Telegram-чат:", span: "@JavaFixerChat", url: "https://t.meChat" },
                { text: "Нашли баг или краш? Пишите в бота:", span: "@JavaFixerTEXbot", url: "https://t.meTEXbot" }
            ],
            mods1_20_1: [
                { name: "Almanac", desc: "Улучшенная интеграция и управление внутриигровой документацией." },
                { name: "Alternate Current", desc: "Глубокая оптимизация алгоритмов редстоуна, снижающая лаги от схем." },
                { name: "Athena", desc: "Инструмент для создания комплексных, динамических и соединенных текстур." },
                { name: "Bad Packets", desc: "Служебный API для безопасной и чистой синхронизации сетевых пакетов." },
                { name: "BadOptimizations", desc: "Патчи, убирающие микрофризы и глупые просчеты в стандартном коде игры." },
                { name: "Cloth Config v11", desc: "Стабильный и быстрый конфигурационный экран для настроек модов." },
                { name: "Clumps", desc: "Объединяет сферы опыта в один объект, убирая жесткие лаги на фермах мобов." },
                { name: "Concurrent Chunk Management Engine", desc: "Многопоточный движок обработки чанков. Ускоряет генерацию и загрузку мира." },
                { name: "Connectivity Mod", desc: "Оптимизация сетевых соединений для уменьшения таймаутов на серверах." },
                { name: "Crash Assistant", desc: "Помощник при крашах, предоставляющий чистые логи для диагностики ошибок." },
                { name: "Debugify", desc: "Комплексное исправление сотен ванильных багов Mojang без потери FPS." },
                { name: "Dynamic FPS", desc: "Снижает нагрузку на видеокарту до минимума, когда игра свернута." },
                { name: "Enhanced Block Entities", desc: "Переводит рендеринг сундуков и блоков на движок Sodium, поднимая FPS." },
                { name: "EntityCulling", desc: "Пропускает рендеринг невидимых мобов и сундуков за стенами, колоссально разгружая видеокарту." },
                { name: "Fabric API", desc: "Основная библиотека-ядро для совместимости и работы модов на платформе Fabric." },
                { name: "FastAnim", desc: "Оптимизация просчета анимаций сущностей, разгружающая центральный процессор." },
                { name: "FerriteCore", desc: "Экстремальное сокращение потребления оперативной памяти за счет сжатия данных." },

        const SMART_TRANSLIT = {
            "содиум": "sodium", "натриум": "sodium", "судиум": "sodium",
            "литиум": "lithium", "индиум": "indium",
            "ферритекор": "ferritecore", "феррите кор": "ferritecore", "ферите коре": "ferritecore", "феритекор": "ferritecore",
            "модернфикс": "modernfix", "криптон": "krypton", "атлант": "athena", "афина": "athena",
            "айрис": "iris", "ирис": "iris", "спарк": "spark", "мод меню": "mod menu", "модменю": "mod menu",
            "клот": "cloth", "клампс": "clumps", "дебагифай": "debugify",
            "энтити": "entityculling", "энтити калинг": "entityculling", "фосфор": "phosphor"
        };

        function openModsModal(versionKey) { 
            const targetMods = versionKey === '1.16.5' ? NATRIUM_CONFIG.mods1_16_5 : NATRIUM_CONFIG.mods1_20_1;
            const modalModsList = document.getElementById('modal-mods-list');
            modalModsList.innerHTML = targetMods.map(m => `
                <div class="mod-item">
                    <div class="mod-name">${m.name}</div>
                    <div class="mod-desc">${m.desc}</div>
                </div>
            `).join('');
            document.getElementById('mods-search').value = '';
            filterMods();
            document.getElementById('mods-modal').classList.add('active'); 
        }
        
        function closeModsModal() { document.getElementById('mods-modal').classList.remove('active'); }
        window.addEventListener('click', (e) => { 
            const m = document.getElementById('mods-modal'); 
            const r = document.getElementById('roulette-modal');
            if (e.target === m) closeModsModal(); 
            if (e.target === r) closeRouletteModal();
        });

        function filterMods() {
            let query = document.getElementById('mods-search').value.toLowerCase().trim();
            if (SMART_TRANSLIT[query]) query = SMART_TRANSLIT[query];
            else {
                for (let rusKey in SMART_TRANSLIT) {
                    if (rusKey.includes(query) && query.length > 2) { query = SMART_TRANSLIT[rusKey]; break; }
                }
            }
            const items = document.querySelectorAll('.mod-item');
            items.forEach(item => {
                const name = item.querySelector('.mod-name').innerText.toLowerCase();
                const desc = item.querySelector('.mod-desc').innerText.toLowerCase();
                if (name.includes(query) || desc.includes(query)) item.classList.remove('hidden');
                else item.classList.add('hidden');
            });
        }

        // Логика работы рулетки версий
        let isSpinning = false;
        function openRouletteModal() {
            document.getElementById('roulette-result-ui').classList.remove('active');
            document.getElementById('btn-spin').style.display = 'inline-flex';
            const tape = document.getElementById('roulette-tape');
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0px)';
            
            // Генерируем 35 случайных элементов для эффекта бесконечной ленты
            let tapeHTML = '';
            for (let i = 0; i < 35; i++) {
                const isMain = Math.random() > 0.5;
                if (isMain) tapeHTML += `<div class="roulette-item v1_20_1">NATRIUM<span>Версия 1.20.1</span></div>`;
                else tapeHTML += `<div class="roulette-item v1_16_5">NATRIUM<span>Версия 1.16.5</span></div>`;
            }
            tape.innerHTML = tapeHTML;
            document.getElementById('roulette-modal').classList.add('active');
        }

        function closeRouletteModal() { if (!isSpinning) document.getElementById('roulette-modal').classList.remove('active'); }

        function spinRoulette() {
            if (isSpinning) return;
            isSpinning = true;
            
            document.getElementById('roulette-result-ui').classList.remove('active');
            document.getElementById('btn-spin').style.display = 'none';
            
            const tape = document.getElementById('roulette-tape');
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0px)';
            
            // Принудительно заставляем браузер сбросить анимацию
            tape.offsetHeight; 
            
            // Выбираем финальный выигрышный элемент (индекс от 25 до 29, чтобы прокрутка была долгой)
            const winIndex = Math.floor(Math.random() * 5) + 25;
            const targetItem = tape.children[winIndex];
            const isVersion1_20_1 = targetItem.classList.contains('v1_20_1');
            
            // Рассчитываем точную координату остановки по центру маркера рулетки
            const itemWidth = 150; // 140px ширина + 10px отступы
            const containerWidth = Math.min(window.innerWidth * 0.9, 500);
            const centerOffset = containerWidth / 2 - itemWidth / 2;
            const targetX = -(winIndex * itemWidth) + centerOffset;
            
            // Запуск красивой и плавной кинетической прокрутки
            tape.style.transition = 'transform 4.5s cubic-bezier(0.1, 0.8, 0.1, 1)';
            tape.style.transform = `translateX(${targetX}px)`;
            
            setTimeout(() => {
                isSpinning = false;
                const configVersion = isVersion1_20_1 ? NATRIUM_CONFIG.versions[0] : NATRIUM_CONFIG.versions[1];
                
                const dlLink = document.getElementById('roulette-download-link');
                dlLink.href = configVersion.link;
                dlLink.setAttribute('download', configVersion.fileName);
                dlLink.innerText = `Скачать NATRIUM ${configVersion.versionNum}`;
                
                document.getElementById('roulette-result-ui').classList.add('active');
            }, 4600);
        }

        function renderSite() {
            const versionsContainer = document.getElementById('versions-container');
            if (versionsContainer) {
                versionsContainer.innerHTML = NATRIUM_CONFIG.versions.map(v => `
                    <div class="card">
                        <span class="card-title">NATRIUM</span>
                        <span class="card-version">Версия ${v.versionNum}</span>
                        <span class="file-type">${v.fileType}</span>
                        <a href="${v.link}" download="${v.fileName}" class="btn-download">Скачать сборку</a>
                        <button class="btn-mods" onclick="openModsModal('${v.versionNum}')">Список модов</button>
                    </div>
                `).join('');
            }

            const socialsContainer = document.getElementById('socials-container');
            if (socialsContainer) {
                socialsContainer.innerHTML = NATRIUM_CONFIG.socials.map(s => `
                    <a href="${s.url}" target="_blank" class="pill-button">
                        ${s.text} <span>${s.span}</span>
                    </a>
                `).join('');
            }
        }

        renderSite();
        resizeCanvas();
        animate();

        // Запускаем часы только здесь, когда весь конфиг уже железно загружен в память!
        setInterval(updateTime, 1000);
        updateTime();
    </script>
