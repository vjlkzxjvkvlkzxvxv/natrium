<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRIUM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.4s, box-shadow 0.4s;
        }

        body {
            background-color: #050506;
            color: #ffffff;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 40px 20px;
        }

        #atom-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .main-wrapper {
            text-align: center;
            max-width: 1100px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        .logo-container {
            position: relative;
            margin-bottom: 25px;
            width: 160px;
            height: 160px;
            border-radius: 38px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }

        .logo-container:hover {
            transform: scale(1.06) rotate(2deg);
            box-shadow: 0 0 40px rgba(255, 140, 0, 0.6);
        }

        .logo {
            width: 100%; height: 100%; object-fit: cover;
        }

        h1 {
            font-size: clamp(3.5rem, 8vw, 5.5rem);
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffcc00 0%, #ff5500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 20px rgba(255, 85, 0, 0.4));
            text-transform: uppercase;
        }

        .subtitle {
            color: #94a3b8;
            font-size: clamp(1.1rem, 3vw, 1.35rem);
            max-width: 600px;
            line-height: 1.6;
            margin-bottom: 50px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 340px;
            margin-bottom: 50px;
            justify-content: center;
        }

        .card {
            background: rgba(16, 16, 20, 0.9);
            border: 2px solid rgba(255, 183, 0, 0.2);
            border-radius: 28px;
            padding: 40px 30px;
            position: relative;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 183, 0, 0.5);
            box-shadow: 0 30px 60px rgba(255, 85, 0, 0.15);
        }

        .version-tag {
            font-size: 2.8rem; font-weight: 800; color: #ffffff; margin-bottom: 5px; display: block;
        }

        .version-tag, .file-type, .btn-download {
            transition: none;
        }

        .file-type {
            color: #ffaa00; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; display: block;
        }

        .btn-download {
            display: inline-flex; align-items: center; justify-content: center; width: 100%;
            background: linear-gradient(135deg, #ffcc00 0%, #ff6600 100%);
            color: #080809; text-decoration: none; padding: 16px 32px; border-radius: 14px;
            font-size: 1.1rem; font-weight: 800; letter-spacing: 0.5px;
            box-shadow: 0 8px 25px rgba(255, 85, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-download:hover { transform: scale(1.03); box-shadow: 0 12px 35px rgba(255, 85, 0, 0.5); }

        .bottom-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }

        .pill-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 14px 26px;
            border-radius: 30px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            backdrop-filter: blur(5px);
            position: relative;
            z-index: 3;
            width: 100%;
        }

        .pill-button span { color: #ffcc00; font-weight: 700; margin-left: 5px; }
        .pill-button:hover { background-color: rgba(255, 183, 0, 0.04); border-color: rgba(255, 183, 0, 0.3); color: #ffffff; }
    </style>
</head>
<body>

    <canvas id="atom-canvas"></canvas>

    <div class="main-wrapper">
        <div class="logo-container">
            <img src="logo.webp" alt="NATRIUM" class="logo" id="site-logo">
        </div>

        <h1 id="site-title"></h1>
        <div class="subtitle" id="site-subtitle"></div>

        <div class="cards-grid" id="versions-container"></div>

        <div class="bottom-links" id="socials-container"></div>
    </div>
    <script>
        const fav = document.createElement('link');
        fav.rel = 'icon'; fav.href = 'favicon.png?v=5';
        document.head.appendChild(fav);

        const canvas = document.getElementById('atom-canvas');
        const ctx = canvas.getContext('2d');
        let particles = []; let sparks = []; 
        const mouse = { x: null, y: null, radius: 140 };

        function resizeCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            initParticles();
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('mousemove', (e) => { 
            mouse.x = e.x; mouse.y = e.y;
            if (sparks.length < 40) sparks.push(new Spark(e.x, e.y));
        });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y; this.baseX = x; this.baseY = y;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.4; this.speedY = (Math.random() - 0.5) * 0.4;
            }
            update() {
                this.baseX += this.speedX; this.baseY += this.speedY;
                if (this.baseX < 0 || this.baseX > canvas.width) this.speedX *= -1;
                if (this.baseY < 0 || this.baseY > canvas.height) this.speedY *= -1;
                if (mouse.x != null && mouse.y != null) {
                    let dx = mouse.x - this.baseX; let dy = mouse.y - this.baseY;
                    let distance = Math.hypot(dx, dy);
                    if (distance < mouse.radius) {
                        let force = (mouse.radius - distance) / mouse.radius;
                        let angle = Math.atan2(dy, dx);
                        let targetX = this.baseX - Math.cos(angle) * force * 35;
                        let targetY = this.baseY - Math.sin(angle) * force * 35;
                        this.x += (targetX - this.x) * 0.1; this.y += (targetY - this.y) * 0.1;
                        return;
                    }
                }
                this.x += (this.baseX - this.x) * 0.08; this.y += (this.baseY - this.y) * 0.08;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255, 180, 0, 0.25)' : 'rgba(255, 85, 0, 0.15)';
                ctx.fill();
            }
        }

        class Spark {
            constructor(x, y) {
                this.x = x; this.y = y; this.size = Math.random() * 3 + 2;
                this.speedX = (Math.random() - 0.5) * 1.5; this.speedY = (Math.random() - 0.5) * 1.5;
                this.alpha = 1; 
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= 0.02; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.shadowBlur = 10; ctx.shadowColor = '#ffaa00'; ctx.fillStyle = '#ffcc00';
                ctx.fill(); ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.floor((canvas.width * canvas.height) / 9000);
            for (let i = 0; i < count; i++) particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) { p.update(); p.draw(); }
            for (let i = 0; i < sparks.length; i++) {
                sparks[i].update(); sparks[i].draw();
                if (sparks[i].alpha <= 0) { sparks.splice(i, 1); i--; }
            }
            requestAnimationFrame(animate);
        }

        const NATRIUM_CONFIG = {
            texts: {
                title: "NATRIUM",
                subtitle: "Сборка-каркас на Minecraft, состоящая из полной оптимизации"
            },
            versions: [
                {
                    tag: "1.20.1",
                    fileType: "Модпак .mrpack",
                    link: "natrium.mrpack",
                    fileName: "Natrium_1.20.1.mrpack"
                }
            ],
            socials: [
                { text: "Наш Telegram-канал:", span: "@JavaFixer", url: "https://t.me" },
                { text: "Наш Telegram-чат:", span: "@JavaFixerChat", url: "https://t.meChat" },
                { text: "Нашли баг или краш? Пишите в бота:", span: "@JavaFixerTEXbot", url: "https://t.meTEXbot" }
            ]
        };

        function renderSite() {
            document.getElementById('site-title').innerText = NATRIUM_CONFIG.texts.title;
            document.getElementById('site-subtitle').innerText = NATRIUM_CONFIG.texts.subtitle;

            const versionsContainer = document.getElementById('versions-container');
            versionsContainer.innerHTML = NATRIUM_CONFIG.versions.map(v => `
                <div class="card">
                    <span class="version-tag">${v.tag}</span>
                    <span class="file-type">${v.fileType}</span>
                    <a href="${v.link}" download="${v.fileName}" class="btn-download">Скачать сборку</a>
                </div>
            `).join('');

            const socialsContainer = document.getElementById('socials-container');
            socialsContainer.innerHTML = NATRIUM_CONFIG.socials.map(s => `
                <a href="${s.url}" target="_blank" class="pill-button">
                    ${s.text} <span>${s.span}</span>
                </a>
            `).join('');
        }

        renderSite();
        resizeCanvas(); 
        animate();
    </script>
</body>
</html>
