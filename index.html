<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" id="meta-viewport">
    <meta name="description" content="Natrium - идеальная сборка Minecraft с экстремальной оптимизацией. Скачайте лучшие моды для повышения FPS.">
    <title>NATRIUM | Оптимизация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <canvas id="atom-canvas"></canvas>

        <div class="top-bar-controls">
            <div class="time-widget" id="realtime-widget"></div>
            <button class="btn-roulette-trigger" id="btn-roulette-open"></button>
        </div>

        <button class="floating-settings-btn" id="btn-open-settings" aria-label="Открыть настройки">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>

        <div class="settings-panel" id="settings-panel">
            <div class="settings-header">
                <h3>Кастомизация</h3>
                <button class="close-settings" id="btn-close-settings">&times;</button>
            </div>
            
            <div class="settings-block">
                <label>Глобальная тема:</label>
                <div class="theme-toggle">
                    <button id="theme-dark" class="active">Тёмная</button>
                    <button id="theme-light">Светлая</button>
                </div>
            </div>

            <div class="settings-block">
                <label>Акцентный цвет (HEX / RGB):</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="native-color-picker">
                    <input type="text" id="hex-rgb-input" placeholder="#ffaa00 или 255,170,0">
                </div>
                <div class="color-presets" id="color-presets"></div>
            </div>
        </div>

        <div class="main-wrapper">
            <div class="logo-container reveal">
                <img alt="Natrium Logo" class="logo" id="site-logo">
            </div>

            <h1 id="site-title" class="reveal"></h1>
            <div class="subtitle reveal" id="site-subtitle"></div>

            <div class="cards-grid reveal" id="versions-container"></div>
            
            <div class="instruction-wrapper reveal" id="instruction-container"></div>

            <!-- НОВЫЙ БЛОК ПРЕИМУЩЕСТВ -->
            <div class="advantages-wrapper reveal" id="advantages-container"></div>
            
            <div class="bottom-links reveal" id="socials-container"></div>
        </div>

        <div class="modal-overlay" id="mods-modal">
            <div class="modal-window">
                <div class="modal-header">
                    <div class="modal-title" id="mods-modal-title"></div>
                    <button class="modal-close" id="mods-close-btn">&times;</button>
                </div>
                <div class="search-container">
                    <input type="text" class="search-input" id="mods-search" aria-label="Поиск мода">
                </div>
                <div class="mods-list" id="modal-mods-list"></div>
            </div>
        </div>

        <div class="modal-overlay" id="roulette-modal">
            <div class="modal-window roulette-window">
                <div class="modal-header">
                    <div class="modal-title" id="roulette-modal-title"></div>
                    <button class="modal-close" id="roulette-close-btn">&times;</button>
                </div>
                
                <div class="roulette-container">
                    <div class="roulette-marker"></div>
                    <div class="roulette-tape" id="roulette-tape"></div>
                </div>

                <div class="roulette-actions">
                    <button class="btn-download" id="btn-spin"></button>
                    <div class="roulette-result-buttons" id="roulette-result-ui">
                        <button class="btn-download" id="roulette-download-btn"></button>
                        <button class="btn-mods" style="margin-bottom: 4px;" id="btn-spin-again"></button>
                        <button class="btn-mods" id="btn-roulette-home"></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="download-modal">
            <div class="modal-window download-window">
                <div class="modal-header download-header">
                    <div class="modal-title" id="download-modal-title"></div>
                    <button class="modal-close" id="download-close-btn">&times;</button>
                </div>
                <div id="download-modal-content"></div>
            </div>
        </div>
    </div>

    <script src="audio-base64.js" defer></script>
    <script src="cfg.js" defer></script>
    <script src="app.js" defer></script>
</body>
</html>
